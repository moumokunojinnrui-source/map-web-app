<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geo Memories - 時空タイムスリップマップ</title>
  
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="js/leaflet.layergroup.collision.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="map"></div>

  <div id="controlPanel">
    <div id="mapTitle">読み込み中...</div>
    <div id="uiPanel"></div>
  </div>

  <div id="metaIndicator">
    <div id="zoomIndicator">Zoom: --</div>
  </div>

  <div id="panoModal" class="modal">
    <div class="modal-content">
      <span class="close-button" onclick="document.getElementById('panoModal').style.display='none'">&times;</span>
      <div id="panoViewer"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
